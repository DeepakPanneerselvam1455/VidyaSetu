<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VidyaSetu - AI Learning Platform</title>
  <script>
    // Safeguard 4: LocalStorage Key Migration
    try {
      const oldKey = 'skillforge-ui-theme';
      const newKey = 'vidyasetu-ui-theme';
      if (localStorage.getItem(oldKey) && !localStorage.getItem(newKey)) {
        localStorage.setItem(newKey, localStorage.getItem(oldKey));
        // Optional: localStorage.removeItem(oldKey); // Keep for safety for now
      }
    } catch (e) {
      console.warn("Theme migration failed", e);
    }
  </script>
  <script>
    // Safeguard 2: Tailwind Config MUST be defined BEFORE the CDN script
    tailwind = {
      darkMode: 'class',
      theme: {
        extend: {
          backgroundColor: {
            main: 'var(--bg-main)',
            surface: 'var(--bg-surface)',
            primary: 'var(--bg-primary)',
          },
          textColor: {
            main: 'var(--text-main)',
            onPrimary: 'var(--text-on-primary)',
            muted: 'var(--text-muted)',
          },
          borderColor: {
            default: 'var(--border-default)',
            focus: 'var(--border-focus)',
          },
          colors: {
            // Shared colors (rings, borders etc)
            primary: 'var(--bg-primary)',
            error: 'var(--color-error)',
            success: 'var(--color-success)',
            warning: 'var(--color-warning)',

            // Legacy/Compat mappings (kept for safety)
            blue: {
              500: 'var(--bg-primary)', // Map legacy blue to primary
            },
            indigo: {
              500: 'var(--bg-primary)', // Map legacy indigo to primary
              600: 'var(--bg-primary)',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.19.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^6.28.0",
    "clsx": "https://aistudiocdn.com/clsx@^2.1.1",
    "tailwind-merge": "https://aistudiocdn.com/tailwind-merge@^3.3.1",
    "class-variance-authority": "https://aistudiocdn.com/class-variance-authority@^0.7.1",
    "date-fns": "https://aistudiocdn.com/date-fns@^4.1.0",
    "uuid": "https://esm.sh/uuid@^13.0.0"
  }
}
</script>
  <script>
      // Prevents FOUC (Flash of Unstyled Content)
      (function () {
        const theme = localStorage.getItem('vidyasetu-ui-theme') || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
  </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-slate-50 dark:bg-slate-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
